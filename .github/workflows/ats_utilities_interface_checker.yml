name: ats_utilities_interface_checker

on:
  push:
    branches: [ master ]
    paths:
      - 'ats_utilities/**'
  pull_request:
    branches: [ master ]
    paths:
      - 'ats_utilities/**'

jobs:
  interface_gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Verify that each concrete class implements a valid interface
        run: |
          python3 .github/scripts/check_interfaces.py
