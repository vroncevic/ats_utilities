name: ats_utilities_ocp_checker

on:
  pull_request:
    branches: [ master ]
    paths:
      - 'ats_utilities/**/i*.py'

jobs:
  ocp_gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Open-Closed Principle (Disabled)
        run: |
          echo "✅ OCP check disabled."
          exit 0
