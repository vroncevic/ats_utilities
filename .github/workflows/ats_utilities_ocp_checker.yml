name: ats_utilities_ocp_checker

on:
  pull_request:
    branches: [ master ]
    paths:
      - 'ats_utilities/**/i*.py'

jobs:
  ocp_gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Open-Closed Principle (No interface modifications)
        run: |
          errors_found=0
          
          # Fetch the target branch to compare changes
          git fetch origin master:master
          
          # Find all modified interface files in this PR compared to master
          changed_interfaces=$(git diff --name-only master...HEAD -- 'ats_utilities/**/i*.py')
          
          for iface in $changed_interfaces; do
            # Check if the file already existed on master branch
            if git cat-file -e "master:$iface" 2>/dev/null; then
              echo "❌ OCP Violation: Existing interface '$iface' has been modified!"
              echo "Interfaces must be closed for modification. Create a new interface or extend instead."
              errors_found=1
            fi
          done
          
          if [ $errors_found -eq 1 ]; then
            echo "---"
            echo "Quality Gate Failed! Open-Closed Principle violation detected."
            exit 1
          else
            echo "✅ Quality Gate Pass: No existing interfaces were modified."
          fi
