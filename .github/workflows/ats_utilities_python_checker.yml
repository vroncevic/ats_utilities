name: ats_utilities_python_checker

on:
  push:
    branches: [ master ]
    paths:
      - 'ats_utilities/**'
      - 'setup.py'
  pull_request:
    branches: [ master ]
    paths:
      - 'ats_utilities/**'
      - 'setup.py'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check module length and line limits
        run: |
          python3 .github/scripts/check_module_limits.py
