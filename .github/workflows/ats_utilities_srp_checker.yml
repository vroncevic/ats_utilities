name: ats_utilities_srp_checker

on:
  push:
    branches: [ master ]
    paths:
      - 'ats_utilities/**'
  pull_request:
    branches: [ master ]
    paths:
      - 'ats_utilities/**'

jobs:
  srp_gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Check Single Responsibility Principle violations
        run: |
          errors_found=0
          
          # Find all Python files within the package, ignoring __init__.py files
          modules=($(find ats_utilities/ -type f -name '*.py' -not -name '__init__.py'))
          
          for mod in "${modules[@]}"; do
            # 1. Count maximum methods per class (docstrings do not affect this)
            method_count=$(grep -c "^    def " "$mod" || true)
            if [ "$method_count" -gt 12 ]; then
              echo "❌ SRP Violation: Module '$mod' contains $method_count methods (Max allowed is 12). Split the class!"
              errors_found=1
            fi
            
            # 2. SRP Check: Count ONLY logical lines of code per method (ignoring docs/comments)
            bloated_methods=$(awk '
              # When a new method starts, check the logical lines accumulated for the previous one
              /^    def / { 
                if (logical_lines > 180) {
                  print "Line " NR-lines_elapsed ": Method is too long (" logical_lines " logical lines)";
                }
                logical_lines = 0;
                in_docstring = 0;
                inside_method = 1;
                next;
              }
              
              # Reset when exiting the class/method scope back to global scope
              /^[a-zA-Z]/ { inside_method = 0; in_docstring = 0; logical_lines = 0 }
              
              # Track block docstrings (triple quotes) inside methods
              inside_method && (/"""/ || /\x27\x27\x27/) { 
                in_docstring = !in_docstring; 
                next; 
              }
              
              # Count lines only if we are inside a method, not in a docstring, not a comment, and not empty
              inside_method {
                # Skip inline comments or empty/whitespace-only lines
                if (!in_docstring && $0 !~ /^[[:space:]]*#/ && $0 !~ /^[[:space:]]*$/) {
                  logical_lines++;
                }
              }
            ' "$mod")
            
            if [ ! -z "$bloated_methods" ]; then
              echo "❌ SRP Violation in '$mod':"
              echo "$bloated_methods"
              errors_found=1
            fi
          done
          
          if [ $errors_found -eq 1 ]; then
            echo "---"
            echo "Quality Gate Failed! Code violates SRP bounds (max 12 methods per class, max 180 logical lines per method)."
            exit 1
          else
            echo "✅ Quality Gate Pass: SRP constraints are respected."
          fi
